<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>DHTML Form Validation</title>

 <style>
 body { font-family: Arial; background:#eef2f5; }
 .form-box {
     width: 380px; background:#fff; padding:20px;
     margin:40px auto; border-radius:6px;
     box-shadow:0 0 6px rgba(0,0,0,0.2);
 }
 h2 { text-align:center; color:#006666; margin-top:0; }
 label { font-weight:bold; display:block; margin-top:10px; }
 input { width:100%; padding:6px; margin-top:5px; }
 .error { color:red; font-size:12px; }
 .btn { margin-top:15px; text-align:center; }
 </style>

 <script>
 function validateForm() {
     let valid = true;

     let name = document.getElementById("name").value.trim();
     let email = document.getElementById("email").value.trim();
     let pass = document.getElementById("pass").value;
     let cpass = document.getElementById("cpass").value;
     let age = document.getElementById("age").value;

     // Clear previous errors
     document.querySelectorAll(".error").forEach(e => e.innerHTML = "");

     if (name === "") {
         document.getElementById("nameErr").innerHTML = "Enter your name";
         valid = false;
     }

     let pattern = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
     if (email === "" || !pattern.test(email)) {
         document.getElementById("emailErr").innerHTML = "Enter a valid email";
         valid = false;
     }

     if (pass.length < 6) {
         document.getElementById("passErr").innerHTML = "Min 6 characters";
         valid = false;
     }

     if (pass !== cpass) {
         document.getElementById("cpassErr").innerHTML = "Passwords do not match";
         valid = false;
     }

     if (age <= 0) {
         document.getElementById("ageErr").innerHTML = "Enter valid age";
         valid = false;
     }

     if (!valid) return false;

     alert("Form submitted successfully!");
     return true;
 }
 </script>

</head>

<body>

 <div class="form-box">
     <h2>Student Registration</h2>

     <form onsubmit="return validateForm();">
         <label>Name</label>
         <input type="text" id="name">
         <span id="nameErr" class="error"></span>

         <label>Email</label>
         <input type="text" id="email">
         <span id="emailErr" class="error"></span>

         <label>Password</label>
         <input type="password" id="pass">
         <span id="passErr" class="error"></span>

         <label>Confirm Password</label>
         <input type="password" id="cpass">
         <span id="cpassErr" class="error"></span>

         <label>Age</label>
         <input type="number" id="age">
         <span id="ageErr" class="error"></span>

         <div class="btn">
             <input type="submit" value="Register">
             <input type="reset" value="Clear">
         </div>
     </form>
 </div>

</body>
</html>
